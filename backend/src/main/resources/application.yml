spring:
  application:
    name: operations-backend
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER:${SUPABASE_URL:http://127.0.0.1:54321}/auth/v1}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  supabase:
    url: ${SUPABASE_URL:http://127.0.0.1:54321}
    anon-key: ${SUPABASE_ANON_KEY:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    imports-bucket: ${SUPABASE_IMPORTS_BUCKET:imports}
    jwt-issuer: ${SUPABASE_JWT_ISSUER:${SUPABASE_URL:http://127.0.0.1:54321}/auth/v1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGIN:http://localhost:3000}}
  hikvision:
    base-url: ${HIKVISION_BASE_URL:}
    camera-urls: ${HIKVISION_CAMERA_URLS:http://10.10.4.101,http://10.10.4.102,http://10.10.4.103,http://10.10.4.104,http://10.10.4.105,http://10.10.4.106,http://10.10.4.107}
    username: ${HIKVISION_USERNAME:admin}
    password: ${HIKVISION_PASSWORD:Knack123}
    poll-interval-seconds: ${HIKVISION_POLL_INTERVAL_SECONDS:3}
    lookback-minutes: ${HIKVISION_LOOKBACK_MINUTES:60}
    bridge-token: ${HIKVISION_BRIDGE_TOKEN:}
  zkteco:
    comm-key: ${ZKTECO_ADMS_COMM_KEY:}
    time-zone: ${ZKTECO_TIME_ZONE:Asia/Colombo}
    adms-delay-seconds: ${ZKTECO_ADMS_DELAY_SECONDS:10}
    server-version: ${ZKTECO_ADMS_SERVER_VERSION:GarmentLine-ZKTeco-ADMS}
  employee-portal:
    time-zone: ${EMPLOYEE_PORTAL_TIME_ZONE:Asia/Colombo}
    session-hours: ${EMPLOYEE_PORTAL_SESSION_HOURS:168}
    otp-minutes: ${EMPLOYEE_PORTAL_OTP_MINUTES:10}
    otp-max-attempts: ${EMPLOYEE_PORTAL_OTP_MAX_ATTEMPTS:5}
    expose-development-otp: ${EMPLOYEE_PORTAL_EXPOSE_DEV_OTP:false}
    kiosk-session-minutes: ${EMPLOYEE_PORTAL_KIOSK_SESSION_MINUTES:3}
    kiosk-recognition-window-seconds: ${EMPLOYEE_PORTAL_KIOSK_RECOGNITION_WINDOW_SECONDS:45}
