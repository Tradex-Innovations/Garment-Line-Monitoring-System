services:
  - type: web
    name: garmentline-operations-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_IMPORTS_BUCKET
        value: imports
      - key: SUPABASE_JWT_ISSUER
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: HIKVISION_CAMERA_URLS
        sync: false
      - key: HIKVISION_USERNAME
        sync: false
      - key: HIKVISION_PASSWORD
        sync: false
      - key: HIKVISION_POLL_INTERVAL_SECONDS
        value: 3
      - key: HIKVISION_LOOKBACK_MINUTES
        value: 60
      - key: HIKVISION_BRIDGE_TOKEN
        sync: false
      - key: ZKTECO_ADMS_COMM_KEY
        sync: false
      - key: ZKTECO_TIME_ZONE
        value: Asia/Colombo
      - key: ZKTECO_ADMS_DELAY_SECONDS
        value: 10
      - key: ZKTECO_ADMS_SERVER_VERSION
        value: GarmentLine-ZKTeco-ADMS
